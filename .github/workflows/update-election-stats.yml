name: Update Election Stats

on:
  schedule:
    # 매일 한국시간 10:00 (UTC 01:00) 실행
    # 획정 확정 시기(2026.04~05) 대응: 매일 갱신
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - id: check
        name: 선거일 게이팅 확인 (6/10 이후 스킵)
        run: |
          python3 -c "
          from datetime import date
          active = date.today() <= date(2026, 6, 10)
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run election stats pipeline
        continue-on-error: true
        env:
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
        run: |
          KEY="${NECDC_CODE:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NDCDC_PERSON}}}"; export NEC_API_KEY="$KEY"
          python scripts/fetch_election_stats.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/election_stats.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/election_stats.json
          git commit -m "chore: auto-update election stats $(date +%Y-%m-%d)"
          git pull --rebase origin main && git push
