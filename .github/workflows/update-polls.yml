name: Update Poll Data (NESDC)

on:
  schedule:
    # 매일 한국시간 09:00 (UTC 00:00), 18:00 (UTC 09:00) 실행
    - cron: '0 0 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 pdfplumber

      - name: Run NESDC poll pipeline
        run: python scripts/nesdc_poll_pipeline.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/polls/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/polls/
          git commit -m "chore: auto-update poll data $(date +%Y-%m-%d)"
          git pull --rebase origin main && git push
