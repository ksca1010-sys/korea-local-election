name: Sync NEC Official Candidates

on:
  schedule:
    # 5/15 18:30 KST — 후보자등록 마감 직후 1차 동기화 (UTC 09:30)
    - cron: '30 9 15 5 *'
    # 5/16~5/27 02:30 KST — 사퇴/등록무효/정정 반영 (UTC 17:30)
    - cron: '30 17 15-26 5 *'
  workflow_dispatch:
    inputs:
      log_raw:
        description: 'API 응답 샘플 저장 (--log-raw)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch official registered candidates
        id: fetch_core_candidates
        continue-on-error: true
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: |
          KEY="${NEC_API_KEY:-${NDCDC_PERSON:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NECDC_CODE}}}}"; export NEC_API_KEY="$KEY"
          ARGS=""
          if [ "${{ inputs.log_raw }}" != "false" ]; then ARGS="$ARGS --log-raw"; fi
          python scripts/candidate_pipeline/fetch_nec_candidates.py $ARGS

      - name: Fetch official council candidates
        id: fetch_council_candidates
        continue-on-error: true
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: |
          KEY="${NEC_API_KEY:-${NDCDC_PERSON:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NECDC_CODE}}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/fetch_council_candidates_nec.py --type both

      - name: Validate candidate JSON
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path("data/candidates/governor.json"),
              Path("data/candidates/superintendent.json"),
              Path("data/candidates/mayor_candidates.json"),
              Path("data/candidates/byelection.json"),
              Path("data/candidates/unmatched_candidates.json"),
              *Path("data/candidates/council").glob("*.json"),
              *Path("data/candidates/local_council").glob("*.json"),
          ]
          for path in paths:
              json.loads(path.read_text(encoding="utf-8"))
              print(f"OK: {path}")
          PY
          python scripts/candidate_pipeline/validate_pipeline.py

      - name: Official sync failure gate
        env:
          CORE_OUTCOME: ${{ steps.fetch_core_candidates.outcome }}
          COUNCIL_OUTCOME: ${{ steps.fetch_council_candidates.outcome }}
        run: |
          if [ "$CORE_OUTCOME" = "failure" ] || [ "$COUNCIL_OUTCOME" = "failure" ]; then
            echo "::error::Official candidate sync stage failed: core=${CORE_OUTCOME}, council=${COUNCIL_OUTCOME}"
            exit 1
          fi
          echo "Official candidate sync stages: core=${CORE_OUTCOME}, council=${COUNCIL_OUTCOME}"

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/
          git commit -m "data(candidates): sync NEC official registered candidates $(date +%Y-%m-%d)"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
          if [ "$pushed" != "true" ]; then
            echo "push failed after 3 attempts" >&2
            exit 1
          fi
