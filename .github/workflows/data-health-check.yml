name: Data Health Check

on:
  schedule:
    # 매일 한국시간 12:00 (UTC 03:00) — 오전 워크플로우들이 끝난 후 점검
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # 워크플로우 재실행 권한

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/data_health_check.py

      - name: Commit heal state if changed
        run: |
          git diff --quiet data/.heal_state.json 2>/dev/null || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/.heal_state.json
            git commit -m "chore: update heal state $(date +%Y-%m-%d)"
            git pull --rebase origin main && git push
          }
