name: Update Candidate Data

on:
  schedule:
    # 매일 한국시간 09:00 (UTC 00:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - id: check
        name: 선거일 게이팅 확인 (6/10 이후 스킵)
        run: |
          python3 -c "
          from datetime import date
          active = date.today() <= date(2026, 6, 10)
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic httpx

      # 0-a단계: 재보궐 뉴스 자동감지 + NEC 교차검증
      - name: Detect byelection news
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
        run: |
          KEY="${NECDC_CODE:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NDCDC_PERSON}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/detect_byelection_news.py

      # 0-b단계: 재보궐 선거구 자동 감지 (선관위 API)
      - name: Detect new byelection districts
        continue-on-error: true
        env:
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          KEY="${NECDC_CODE:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NDCDC_PERSON}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/detect_byelections.py --apply

      # 0-c단계: 재보궐 당선 결과 동기화 (선관위 API)
      - name: Sync byelection winners
        continue-on-error: true
        env:
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
        run: |
          KEY="${NECDC_CODE:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NDCDC_PERSON}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/sync_byelection_winners.py

      # 0.5단계: NEC 본후보 등록 데이터 수집 (5/14~ 활성화)
      - name: Fetch NEC official candidates
        continue-on-error: true
        env:
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: |
          KEY="${NECDC_CODE:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NDCDC_PERSON}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/fetch_nec_candidates.py --log-raw

      # 0.9단계: 데이터 스키마 검증 (name 누락 등 조기 감지) — 실패 시 중단
      - name: Validate pipeline data
        run: python scripts/candidate_pipeline/validate_pipeline.py

      # 1단계: 광역단체장 팩트체크 (Claude + 뉴스 + 교차검증)
      - name: Factcheck governor candidates
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_candidates.py

      # 2단계: 교육감 팩트체크 (Claude + 지역뉴스 + 교차검증)
      - name: Factcheck superintendent candidates
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_superintendent.py

      # 3단계: 기초단체장 팩트체크 (Claude + 지역뉴스 + 교차검증)
      - name: Factcheck mayor candidates
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_mayor.py

      # 4단계: 재보궐 팩트체크 → update-byelection.yml로 이관 (Claude API 중복 절감)

      # 4.5단계: 기초단체장 공약 수집 (공약 없는 후보만)
      - name: Collect mayor pledges
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/collect_mayor_pledges.py

      # 4.9단계: 전남광주통합특별시 병합 보정
      - name: Merge gwangju-jeonnam (통합특별시)
        continue-on-error: true
        run: python scripts/candidate_pipeline/merge_gwangju_jeonnam.py

      # 5단계: 개요 narrative에서 발견된 후보 동기화
      - name: Sync candidates from overview narratives
        continue-on-error: true
        run: python scripts/sync_overview_candidates.py --apply

      # 6단계: 다중 교차 검증 (권한대행/중복/광역 겸직 등)
      - name: Cross-validate candidates
        continue-on-error: true
        run: python scripts/candidate_pipeline/cross_validate.py --fix

      - name: Assert candidate data not empty
        run: |
          python3 -c "
          import json, sys
          checks = [
              ('data/candidates/governor.json', 'candidates', 10),
              ('data/candidates/superintendent.json', 'candidates', 10),
              ('data/candidates/mayor_candidates.json', 'candidates', 50),
          ]
          for path, key, min_count in checks:
              d = json.load(open(path))
              cnt = len(d.get(key, []))
              if cnt < min_count:
                  print(f'FATAL: {path} has {cnt} entries (< {min_count})')
                  sys.exit(1)
              print(f'OK: {path} — {cnt} entries')
          "

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/
          git commit -m "chore: auto-update candidate data $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
