name: Update Superintendent Status

on:
  schedule:
    # 매주 목요일 한국시간 10:30 (UTC 01:30) 실행
    - cron: '30 1 * * 4'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run superintendent status factcheck
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          NECDC_CODE: ${{ secrets.NECDC_CODE }}
          NDCDC_LOCAL: ${{ secrets.NDCDC_LOCAL }}
          NDCDC_PAPER: ${{ secrets.NDCDC_PAPER }}
          NDCDC_PERSON: ${{ secrets.NDCDC_PERSON }}
          STATUS_STRICT: "1"
        run: |
          KEY="${NEC_API_KEY:-${NDCDC_PERSON:-${NDCDC_LOCAL:-${NDCDC_PAPER:-$NECDC_CODE}}}}"; export NEC_API_KEY="$KEY"
          export NEC_API_KEYS="${NEC_API_KEY},${NDCDC_PERSON},${NDCDC_LOCAL},${NDCDC_PAPER},${NECDC_CODE}"
          python scripts/candidate_pipeline/fetch_superintendent_status.py --baseline-only

      - name: Validate superintendent status data
        run: |
          python3 scripts/validate_status_freshness.py data/candidates/superintendent_status.json superintendents 17 --max-age-days 9

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/superintendent_status.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/superintendent_status.json
          git commit -m "chore: auto-update superintendent status $(date +%Y-%m-%d)"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
          if [ "$pushed" != "true" ]; then
            echo "push failed after 3 attempts" >&2
            exit 1
          fi
