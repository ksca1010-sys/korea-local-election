name: Update Election Overview

on:
  schedule:
    # 매일 한국시간 07:00 (UTC 22:00 전날) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Update governor overview (광역단체장)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py

      - name: Update superintendent overview (교육감)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py --type=superintendent

      - name: Update mayor overview (기초단체장)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_mayor_overview.py --stale-only

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/election_overview.json data/mayor_overview_state.json 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/election_overview.json data/mayor_overview_state.json
          git commit -m "chore: auto-update election overview $(date +%Y-%m-%d)"
          git push
