name: Update Election Overview

on:
  schedule:
    # 월/수/금 한국시간 11:30 (UTC 02:30) — 주 3회 갱신
    - cron: '30 2 * * 1'
    - cron: '30 2 * * 3'
    - cron: '30 2 * * 5'
  workflow_dispatch:
    inputs:
      scope:
        description: '실행 범위: all, governor, superintendent, mayor, byelection'
        required: false
        default: 'all'
      run_ai_narrative:
        description: '비용 발생 가능: Gemini/Naver 기반 AI narrative 개요도 함께 생성'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      scope:
        description: '실행 범위: all, governor, superintendent, mayor, byelection'
        required: false
        type: string
        default: 'all'
      run_ai_narrative:
        description: '비용 발생 가능: Gemini/Naver 기반 AI narrative 개요도 함께 생성'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.scope || 'all' }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RUN_SCOPE: ${{ inputs.scope || 'all' }}
      RUN_AI_NARRATIVE: ${{ inputs.run_ai_narrative || false }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Show execution scope
        run: |
          echo "scope=${RUN_SCOPE}"
          echo "run_ai_narrative=${RUN_AI_NARRATIVE}"

      - name: Refresh structured overview baseline
        id: structured_overview
        env:
          PYTHONPATH: scripts
        run: python scripts/update_structured_overview.py --scope "${RUN_SCOPE}"

      - name: Update governor overview (광역단체장)
        id: governor_overview
        if: env.RUN_AI_NARRATIVE == 'true' && (env.RUN_SCOPE == 'all' || env.RUN_SCOPE == 'governor')
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_STRICT_MODE: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py

      - name: Update superintendent overview (교육감)
        id: superintendent_overview
        if: env.RUN_AI_NARRATIVE == 'true' && (env.RUN_SCOPE == 'all' || env.RUN_SCOPE == 'superintendent')
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_STRICT_MODE: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py --type=superintendent

      - name: Update mayor overview (기초단체장)
        id: mayor_overview
        if: env.RUN_AI_NARRATIVE == 'true' && (env.RUN_SCOPE == 'all' || env.RUN_SCOPE == 'mayor')
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_STRICT_MODE: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_mayor_overview.py --stale-only

      - name: Update byelection overview (재보궐)
        id: byelection_overview
        if: env.RUN_AI_NARRATIVE == 'true' && (env.RUN_SCOPE == 'all' || env.RUN_SCOPE == 'byelection')
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_STRICT_MODE: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_byelection_overview.py

      - name: Overview failure gate
        env:
          GOV_OUTCOME: ${{ steps.governor_overview.outcome }}
          SUPER_OUTCOME: ${{ steps.superintendent_overview.outcome }}
          MAYOR_OUTCOME: ${{ steps.mayor_overview.outcome }}
          BYE_OUTCOME: ${{ steps.byelection_overview.outcome }}
        run: |
          python3 - <<'PY'
          import os

          scope = os.environ.get("RUN_SCOPE", "all")
          outcomes = {
              "governor": os.environ.get("GOV_OUTCOME", "skipped"),
              "superintendent": os.environ.get("SUPER_OUTCOME", "skipped"),
              "mayor": os.environ.get("MAYOR_OUTCOME", "skipped"),
              "byelection": os.environ.get("BYE_OUTCOME", "skipped"),
          }
          selected = outcomes if scope == "all" else {scope: outcomes.get(scope, "skipped")}
          failed = {name: result for name, result in selected.items() if result == "failure"}
          if failed:
              print(f"Optional AI narrative overview failed: {failed}")
              print("Structured overview baseline was already refreshed; keeping workflow successful.")
          print(f"Overview outcomes: {selected}")
          PY

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/election_overview.json data/mayor_overview_state.json data/governor_overview_state.json data/byelection_overview_state.json 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/election_overview.json data/mayor_overview_state.json data/governor_overview_state.json data/byelection_overview_state.json
          git commit -m "chore: auto-update election overview $(date +%Y-%m-%d)"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
          if [ "$pushed" != "true" ]; then
            echo "push failed after 3 attempts" >&2
            exit 1
          fi
