name: Data Health Check

on:
  schedule:
    # 매일 한국시간 12:00 (UTC 03:00) — 오전 워크플로우들이 끝난 후 점검
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  health-check:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # git push — heal_state 결과 data/.heal_state.json 커밋
      actions: write   # gh workflow run — 실패 워크플로우 자동 재실행 (trigger_workflow)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/data_health_check.py

      - name: Commit heal state if changed
        run: |
          git diff --quiet data/.heal_state.json 2>/dev/null || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/.heal_state.json
            git commit -m "chore: update heal state $(date +%Y-%m-%d)"
            git pull --rebase origin main && git push
          }
