name: Update By-Election Data

on:
  schedule:
    # 매일 한국시간 11:00 (UTC 02:00) — candidates(09:00) 완료 후 실행
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Step 1 - Detect new districts (NEC API)
        continue-on-error: true
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: python scripts/candidate_pipeline/detect_byelections.py --apply

      - name: Step 2 - Fetch & update candidates (news + NEC)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: python scripts/candidate_pipeline/fetch_byelection.py

      - name: Step 3 - Factcheck candidates
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: python scripts/candidate_pipeline/factcheck_byelection.py

      - name: Validate pipeline data
        run: python scripts/candidate_pipeline/validate_pipeline.py

      - name: Assert byelection data not empty
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('data/candidates/byelection.json'))
          districts = d.get('districts', {})
          total = sum(len(v.get('candidates', [])) for v in districts.values() if isinstance(v, dict))
          if len(districts) < 1:
              print(f'FATAL: byelection.json에 선거구 없음 — 파이프라인 실패 의심')
              sys.exit(1)
          print(f'OK: byelection — {len(districts)}개 선거구, {total}명 후보')
          "

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/byelection.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/byelection.json
          git commit -m "chore: auto-update byelection data $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
