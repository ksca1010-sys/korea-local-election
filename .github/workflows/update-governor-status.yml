name: Update Governor Status

on:
  schedule:
    # 매주 화요일 한국시간 10:30 (UTC 01:30) 실행
    - cron: '30 1 * * 2'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai google-generativeai

      - name: Run governor status factcheck
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/candidate_pipeline/fetch_governor_status.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/governor_status.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/governor_status.json
          git commit -m "chore: auto-update governor status $(date +%Y-%m-%d)"
          git push
