name: Update Superintendent Status

on:
  schedule:
    # 매주 목요일 한국시간 10:30 (UTC 01:30) 실행
    - cron: '30 1 * * 4'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Run superintendent status factcheck
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          NECDC_API_KEY: ${{ secrets.NECDC_API_KEY }}
          NECDC_KEY: ${{ secrets.NECDC_KEY }}
          NECDC_SERVICE_KEY: ${{ secrets.NECDC_SERVICE_KEY }}
          NECDC_PUBLIC_KEY: ${{ secrets.NECDC_PUBLIC_KEY }}
          NECDC_CLIENT_KEY: ${{ secrets.NECDC_CLIENT_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          KEY="${NEC_API_KEY:-${NECDC_API_KEY:-${NECDC_KEY:-${NECDC_SERVICE_KEY:-${NECDC_PUBLIC_KEY:-$NECDC_CLIENT_KEY}}}}}}"; export NEC_API_KEY="$KEY"
          python scripts/candidate_pipeline/fetch_superintendent_status.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/superintendent_status.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/superintendent_status.json
          git commit -m "chore: auto-update superintendent status $(date +%Y-%m-%d)"
          git push
