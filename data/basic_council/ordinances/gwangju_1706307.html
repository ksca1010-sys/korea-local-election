<head>
<script type="text/javascript" src="/DRF/js/jquery.js"></script>

	<style>
	body {
	    overflow: hidden; 
	    width: 100%;
		height : 100%;
	}
	
	#bodyDiv {
		width: 100%;
		height: 100%;
		overflow-x : hidden;
		overflow-y : auto;
	}
	
	</style>
</head>
<script type="text/javascript">
	$(document).ready(function(){
		// 모바일일 경우 수행		
		if($("#mobileYn").val() == 'Y'){
			var url = "mobileOrdinInfoR.do";
			var param = "ordinSeq="+$("#ordinSeq").val()+"&gubun="+$("#gubun").val()+"&xmlSrvYn="+$("#xmlSrvYn").val()+"&Mobile=Y";
			
			$.ajax({
				url: url,
				type:'POST',
				dataType:'text',
				data: param,
				timeout : 150000,
		        error : function(request,status,error){
		        	//alert("다시 실행해주시기 바랍니다. :: " + status);
		        	location.href = $("#url").val();
		        },
				success: function(responseData, result){
					if(responseData != ''){
						$("#bodyDiv").html(responseData);
					}else{
						location.href = $("#url").val();
					}
				}
			});	
		}
	});
</script>
<body topmargin="0" leftmargin="0" rightmargin="0" bottommargin="0" marginheight="0" marginwidth="0">
<input type="hidden" id="ordinSeq" value ="1706307"/>
<input type="hidden" id="gubun" value ="ELIS"/>
<input type="hidden" id="xmlSrvYn" value ="N"/>
<input type="hidden" id="mobileYn" value=""/> 
<input type="hidden" id="url" value="https://www.law.go.kr/LSW/ordinInfoP.do?urlMode=ordinScJoRltInfoR&viewCls=ordinInfoP&ordinSeq=1706307&chrClsCd=010202&gubun=ELIS"/>

							src = "https://www.law.go.kr/LSW/ordinInfoP.do?urlMode=ordinScJoRltInfoR&viewCls=ordinInfoP&ordinSeq=1706307&chrClsCd=010202&gubun=ELIS"></iframe>
				</td>
			</tr>
		</table>
	

</body>
</html>
