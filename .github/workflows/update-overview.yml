name: Update Election Overview

on:
  schedule:
    # 월/수/금 한국시간 11:30 (UTC 02:30) — 주 3회 갱신
    - cron: '30 2 * * 1'
    - cron: '30 2 * * 3'
    - cron: '30 2 * * 5'
  workflow_dispatch:
  workflow_call:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Update governor overview (광역단체장)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py

      - name: Update superintendent overview (교육감)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_election_overview.py --type=superintendent

      - name: Update mayor overview (기초단체장)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_mayor_overview.py --stale-only

      - name: Update byelection overview (재보궐)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts
        run: python scripts/update_byelection_overview.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/election_overview.json data/mayor_overview_state.json data/governor_overview_state.json data/byelection_overview_state.json 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/election_overview.json data/mayor_overview_state.json data/governor_overview_state.json data/byelection_overview_state.json
          git commit -m "chore: auto-update election overview $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
