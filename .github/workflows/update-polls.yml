name: Poll Sync (NESDC)

on:
  schedule:
    # 매일 한국시간 10:00 (UTC 01:00) — update-candidates(09:00) 1시간 여유 확보
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  sync:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 pdfplumber

      - name: Run NESDC pipeline
        run: python scripts/nesdc_poll_pipeline.py

      - name: Reparse empty results
        continue-on-error: true
        run: python scripts/reparse_pdfs.py

      - name: Assert polls data not empty
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('data/polls/polls.json'))
          total = d.get('totalCount', 0)
          if total < 100:
              print(f'FATAL: totalCount={total} — NESDC 파이프라인 실패 의심')
              sys.exit(1)
          print(f'OK: {total} polls')
          "

      # PDF 재시도 큐 모니터
      # reparse_pdfs 가 3회 실패로 abandoned 처리한 조사 수를 주기적으로 표면화.
      # 일정 임계치를 넘으면 warning 으로 운영자 확인 유도.
      # fail 은 아님 (데이터 품질 신호이지 CI 실패 사유는 아님).
      - name: Monitor PDF parse queue
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          path = Path("data/polls/parse_queue.json")
          if not path.exists():
              print("parse_queue.json 없음 — 스킵")
              raise SystemExit(0)

          queue = json.loads(path.read_text(encoding="utf-8"))
          entries = queue.get("entries", {})
          total = len(entries)
          abandoned = [
              (nid, e) for nid, e in entries.items()
              if e.get("status") == "abandoned"
          ]
          retry = total - len(abandoned)

          THRESHOLD = 20  # abandoned 임계치

          print(f"parse_queue: 전체 {total}건 (retry {retry}, abandoned {len(abandoned)})")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write("\n## PDF parse queue\n\n")
                  f.write(f"- 전체 등록: **{total}건**\n")
                  f.write(f"- 재시도 대기: {retry}건\n")
                  f.write(f"- 포기 (abandoned): **{len(abandoned)}건** (임계치 {THRESHOLD})\n\n")
                  if abandoned:
                      f.write("### Abandoned 샘플\n\n")
                      f.write("| nttId | attempts | lastReason |\n")
                      f.write("| --- | --- | --- |\n")
                      for nid, e in abandoned[:20]:
                          reason = (e.get("lastReason") or "").replace("|", "/")[:60]
                          f.write(f"| {nid} | {e.get('attempts', 0)} | {reason} |\n")
                      if len(abandoned) > 20:
                          f.write(f"\n... 외 {len(abandoned) - 20}건\n")

          if len(abandoned) > THRESHOLD:
              print(f"::warning::PDF 재시도 큐 abandoned {len(abandoned)}건 "
                    f"(임계치 {THRESHOLD}). reparse_pdfs.py --reset-queue 후 "
                    "수동 확인 또는 소스 조사 필요.")
          PY

      - name: Check for changes
        id: diff
        run: git diff --quiet data/polls/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/polls/
          NEW=$(git diff --cached data/polls/polls.json | grep '^\+' | grep '"nttId"' | wc -l | tr -d ' ')
          git commit -m "data: poll sync $(date +%Y-%m-%d) -- 신규 ${NEW}건"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
