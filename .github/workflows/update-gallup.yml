name: Update Gallup National Poll

on:
  schedule:
    # 매주 금요일 한국시간 18:00 (UTC 09:00) - 갤럽 발표 후
    - cron: '0 9 * * 5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: 선거일 게이팅 확인 (election_meta.json + 7일)
        run: |
          python3 -c "
          import json
          from datetime import date, timedelta
          meta = json.load(open('data/static/election_meta.json'))
          cutoff = date.fromisoformat(meta['electionDate']) + timedelta(days=7)
          active = date.today() <= cutoff
          print('active=' + ('true' if active else 'false'))
          " >> $GITHUB_OUTPUT

  update:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install certifi

      - name: Run gallup update
        run: python scripts/update_gallup.py

      - name: Validate gallup data
        run: |
          python3 - <<'PY'
          import json
          import sys

          data = json.load(open("data/static/gallup_national_poll.json", encoding="utf-8"))
          state = json.load(open("data/polls/state.json", encoding="utf-8"))
          polls_json = json.load(open("data/polls/polls.json", encoding="utf-8"))
          support = data.get("data")
          if not isinstance(support, dict) or not support:
              print("gallup_national_poll.json has no party support data", file=sys.stderr)
              sys.exit(1)
          if not data.get("publishDate") or not data.get("url"):
              print("gallup_national_poll.json is missing publishDate or url", file=sys.stderr)
              sys.exit(1)
          if int(data.get("sampleSize") or 0) <= 0:
              print("gallup_national_poll.json has invalid sampleSize", file=sys.stderr)
              sys.exit(1)
          report_no = data.get("reportNo")
          state_matches = [
              p for p in state.get("polls", [])
              if "한국갤럽" in p.get("pollOrg", "")
              and "party_support" in (p.get("electionTypes") or [p.get("electionType")])
              and p.get("reportNo") == report_no
              and p.get("results")
          ]
          if not state_matches:
              print("state.json missing synced Gallup party_support results", file=sys.stderr)
              sys.exit(1)
          national_matches = [
              p for p in polls_json.get("national", [])
              if "한국갤럽" in p.get("pollOrg", "")
              and p.get("reportNo") == report_no
              and p.get("results")
          ]
          if not national_matches:
              print("polls.json missing synced Gallup national results", file=sys.stderr)
              sys.exit(1)
          print(f"Gallup validated: {data.get('publishDate')} {data.get('reportNo', '')}")
          PY

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet js/data.js data/static/gallup_national_poll.json data/polls/state.json data/polls/polls.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js data/static/gallup_national_poll.json data/polls/state.json data/polls/polls.json
          git commit -m "chore: auto-update gallup national poll $(date +%Y-%m-%d)"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "push attempt $i failed, retrying..."
            sleep 10
          done
          if [ "$pushed" != "true" ]; then
            echo "push failed after 3 attempts" >&2
            exit 1
          fi

    outputs:
      changed: ${{ steps.diff.outputs.changed }}

  # 갤럽 데이터가 실제 변경된 경우에만 개황 연쇄 업데이트
  trigger-overview:
    needs: [gate, update]
    if: needs.gate.outputs.active == 'true' && needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write   # gh workflow run — update-overview.yml 연쇄 트리거
    steps:
      - name: Trigger overview update
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-overview.yml --repo ${{ github.repository }}
