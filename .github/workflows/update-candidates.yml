name: Update Candidate Data

on:
  schedule:
    # 매일 한국시간 09:00 (UTC 00:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx google-genai google-generativeai

      # 0-a단계: 재보궐 뉴스 자동감지 + NEC 교차검증
      - name: Detect byelection news
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: python scripts/candidate_pipeline/detect_byelection_news.py

      # 0-b단계: 재보궐 선거구 자동 감지 (선관위 API)
      - name: Detect new byelection districts
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/candidate_pipeline/detect_byelections.py --apply

      # 0-b단계: 재보궐 당선 결과 동기화 (선관위 API)
      - name: Sync byelection winners
        env:
          NEC_API_KEY: ${{ secrets.NEC_API_KEY }}
        run: python scripts/candidate_pipeline/sync_byelection_winners.py

      # 1단계: 광역단체장 팩트체크 (Gemini + 뉴스 + 교차검증)
      - name: Factcheck governor candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_candidates.py

      # 2단계: 교육감 팩트체크 (Gemini + 지역뉴스 + 교차검증)
      - name: Factcheck superintendent candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_superintendent.py

      # 3단계: 기초단체장 팩트체크 (Gemini + 지역뉴스 + 교차검증)
      - name: Factcheck mayor candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_mayor.py

      # 4단계: 재보궐 후보 팩트체크 (뉴스 기반 + 교차검증)
      - name: Factcheck byelection candidates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/factcheck_byelection.py

      # 4.5단계: 기초단체장 공약 수집 (공약 없는 후보만)
      - name: Collect mayor pledges
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          PYTHONPATH: scripts:scripts/candidate_pipeline
        run: python scripts/candidate_pipeline/collect_mayor_pledges.py

      # 5단계: 개요 narrative에서 발견된 후보 동기화
      - name: Sync candidates from overview narratives
        run: python scripts/sync_overview_candidates.py --apply

      # 6단계: 다중 교차 검증 (권한대행/중복/광역 겸직 등)
      - name: Cross-validate candidates
        run: python scripts/candidate_pipeline/cross_validate.py --fix

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/candidates/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates/
          git commit -m "chore: auto-update candidate data $(date +%Y-%m-%d)"
          git push

    outputs:
      changed: ${{ steps.diff.outputs.changed }}

  # 후보 데이터 변경 시 개요 narrative 연쇄 갱신
  trigger-overview:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/update-overview.yml
    secrets: inherit
