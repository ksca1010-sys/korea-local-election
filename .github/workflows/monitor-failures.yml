name: Monitor Automation Failures

on:
  workflow_run:
    workflows:
      - "Update Candidate Data"
      - "Update Gallup National Poll"
      - "Poll Sync (NESDC)"
      - "Update Election Overview"
      - "Update Election Stats"
      - "Update Governor Status"
      - "Update Mayor Status"
      - "Update Superintendent Status"
      - "Update By-Election Data"
      - "Data Health Check"
    types: [completed]

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write    # GitHub Issue 자동 생성 권한
      actions: read    # 실패 로그 조회 권한

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run failure monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/monitor_failures.py \
            --workflow "${{ github.event.workflow_run.name }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --conclusion "${{ github.event.workflow_run.conclusion }}" \
            --run-url "${{ github.event.workflow_run.html_url }}"

      - name: Commit updated failure counts
        run: |
          git diff --quiet data/.failure_counts.json 2>/dev/null || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/.failure_counts.json
            git commit -m "chore: update failure counts [skip ci]"
            git pull --rebase origin main && git push
          }
